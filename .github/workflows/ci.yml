name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      IGCSE_FAKE_EMBED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip wheel
          pip install -e '.[dev]'
      - name: Ruff
        run: ruff check agent tests
      - name: Mypy
        run: mypy agent
      - name: Pytest
        run: pytest -q --cov=agent --cov-report=term-missing
      - name: Evals
        run: python -m evals.run --threshold-check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simulator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: simulator/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run build

  rubric_grader_eval:
    runs-on: ubuntu-latest
    needs: [python, frontend]
    defaults:
      run:
        working-directory: simulator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: simulator/package-lock.json
      - run: npm ci
      - run: npx vitest run src/lib/grade
