# Rubric grader agreement set.
#
# Each case has:
#   - rubric: a QuestionRubric JSON (Python-side schema)
#   - student_answers: dict keyed by part id -> StudentAnswer fields
#   - gold_marks: what a human marker would award
#   - tolerance: marks tolerance accepted as agreement
#
# The harness loads each rubric into Python and then calls the simulator's
# grader via Node to produce marks. CI blocks deploy if agreement drops
# below the threshold in evals/run.py.

cases:
  - id: mole-full-marks
    rubric:
      question_id: "2018-chem-mole-q1"
      source_question_db_id: 1
      type: numeric
      max_marks: 3
      stem: "Calculate the number of moles in 10 g of calcium. Ar(Ca) = 40."
      figure_paths: []
      parts:
        - id: "a"
          prompt: "Calculate n."
          answer_type: numeric
          max_marks: 3
          numeric_answer: 0.25
          numeric_unit: mol
          numeric_tolerance_pct: 2
          accepted_phrasings: []
          required_working_concepts:
            - concept: "uses n = m / M"
              marks: 1
              hints: ["n = m/M", "n=m/M", "moles = mass / molar mass"]
            - concept: "correct molar mass (Ca = 40)"
              marks: 1
              hints: ["40", "Ca = 40"]
          common_mistakes:
            - match: { kind: keyword_absent, keyword: "mol" }
              feedback: "You forgot the units (mol)."
            - match: { kind: numeric_off_by, magnitude: 10 }
              feedback: "Decimal-place slip."
          model_answer_html: "<p>n = m / M = 10 / 40 = <b>0.25 mol</b></p>"
          chapter_refs: ["n = m / M"]
    student_answers:
      a:
        text: "n = m/M = 10 / 40 = 0.25 mol"
    gold_marks: 3
    tolerance: 0.5

