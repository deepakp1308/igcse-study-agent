            - concept: "more collisions per unit time"
              marks: 1
              hints: ["more collisions", "increase in collisions", "collision frequency"]
            - concept: "rate approximately doubles"
              marks: 1
              hints: ["rate doubles", "rate approximately doubles", "rate increases"]
          accepted_phrasings: []
          common_mistakes: []
          model_answer_html: "<p>Doubling concentration means more particles per unit volume, so collisions per unit time increase, and the rate approximately doubles.</p>"
          chapter_refs: ["Collision theory"]
    student_answers:
      a:
        text: "Doubling concentration means more particles per unit volume. That leads to more collisions per unit time. So the rate approximately doubles."
    gold_marks: 3
    tolerance: 0.5

