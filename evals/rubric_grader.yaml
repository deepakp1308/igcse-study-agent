            - { label: "A", text: "oxygen" }
            - { label: "B", text: "hydrogen" }
            - { label: "C", text: "chlorine" }
            - { label: "D", text: "nitrogen" }
          mcq_correct_label: "B"
          accepted_phrasings: []
          required_working_concepts: []
          common_mistakes: []
          model_answer_html: "<p><b>B</b>. hydrogen</p>"
